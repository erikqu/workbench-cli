name: Release

# Cut a GitHub Release whenever a version tag is pushed, e.g.:
#   git tag v0.1.0 && git push origin v0.1.0
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: workbench-ui
        run: bun install --frozen-lockfile

      - name: Typecheck
        working-directory: workbench-ui
        run: bun run typecheck

      - name: Test
        working-directory: workbench-ui
        run: bun test

      - name: Package source tarball
        run: |
          tar -czf "workbench-cli-${GITHUB_REF_NAME}.tar.gz" \
            --exclude='.git' \
            --exclude='workbench-ui/node_modules' \
            --exclude='workbench-ui/artifacts' \
            bin workbench-ui install.sh README.md LICENSE AGENT.md

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: workbench-cli-*.tar.gz
