<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Workbench Screenshot</title>
    <link rel="stylesheet" href="/node_modules/@xterm/xterm/css/xterm.css">
    <style>
    html,
    body,
    #terminal {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #1e1e1e;
    }
    </style>
  </head>
  <body>
    <div id="terminal"></div>
    <script type="module">
    import { Terminal } from "/node_modules/@xterm/xterm/lib/xterm.mjs";

    const params = new URLSearchParams(location.search);
    const lightTerminal = option("terminalTheme") === "light";
    const terminalTheme = lightTerminal
      ? { background: "#ffffff", foreground: "#18181b", cursor: "#1f2328" }
      : { background: "#1e1e1e", foreground: "#eeece6", cursor: "#e4e4e7" };
    document.documentElement.style.background = terminalTheme.background;
    document.body.style.background = terminalTheme.background;
    document.getElementById("terminal").style.background =
      terminalTheme.background;
    const fontFamily =
      option("fontFamily") ??
      "'JetBrains Mono', 'Cascadia Mono', 'Fira Code', 'SFMono-Regular', Menlo, Monaco, Consolas, 'Liberation Mono', 'DejaVu Sans Mono', monospace";

    const initialCols = numericOption("cols", 180);
    const initialRows = numericOption("rows", 40);
    const term = new Terminal({
      cols: initialCols,
      rows: initialRows,
      convertEol: true,
      cursorBlink: false,
      fontFamily,
      fontSize: numericOption("fontSize", 15),
      fontWeight: option("fontWeight") ?? "400",
      fontWeightBold: option("fontWeightBold") ?? "700",
      letterSpacing: numericOption("letterSpacing", 0),
      lineHeight: numericOption("lineHeight", 1.12),
      theme: terminalTheme,
    });

    term.open(document.getElementById("terminal"));
    const socket = new WebSocket(`ws://${location.host}/pty`);
    let outputBytes = 0;
    let outputEvents = 0;
    let parsedWrites = 0;
    socket.addEventListener("message", (event) => {
      const data = event.data;
      outputBytes += new TextEncoder().encode(data).byteLength;
      outputEvents += 1;
      term.write(data, () => {
        parsedWrites += 1;
      });
      window.__workbenchSawOutput = true;
    });
    socket.addEventListener("open", () => {
      window.__workbenchSocketOpen = true;
    });
    socket.addEventListener("close", () => {
      window.__workbenchSocketClosed = true;
    });
    term.onData((data) => socket.send(data));
    // Test hooks: send raw bytes to the workbench PTY and read back the
    // rendered terminal buffer so the screenshot script can assert on it.
    window.__send = (data) => socket.send(data);
    window.__paste = (data) =>
      socket.send(`\x1b[200~${data.replaceAll("\x1b[201~", "")}\x1b[201~`);
    window.__resizeTerminal = (cols, rows) => {
      term.resize(cols, rows);
      socket.send(`\0WORKBENCH_RESIZE ${cols} ${rows}`);
    };
    window.__outputStats = () => ({ outputBytes, outputEvents, parsedWrites });
    window.__bufferText = () => {
      const buffer = term.buffer.active;
      const lines = [];
      for (let i = 0; i < term.rows; i++) {
        lines.push(
          buffer.getLine(buffer.viewportY + i)?.translateToString(true) ?? ""
        );
      }
      return lines.join("\n");
    };
    window.__bufferGrid = () => {
      const buffer = term.buffer.active;
      const lines = [];
      for (let i = 0; i < term.rows; i++) {
        lines.push(
          (buffer.getLine(buffer.viewportY + i)?.translateToString(false) ?? "")
            .slice(0, term.cols)
            .padEnd(term.cols, " ")
        );
      }
      return { cols: term.cols, lines, rows: term.rows };
    };
    window.__cursorState = () => {
      const buffer = term.buffer.active;
      const coreService = term._core?.coreService;
      return {
        visible: coreService?.isCursorHidden !== true,
        x: buffer.cursorX,
        y: buffer.cursorY + buffer.baseY - buffer.viewportY,
      };
    };
    window.__cellState = (col, row) => {
      const buffer = term.buffer.active;
      const cell = buffer.getLine(buffer.viewportY + row)?.getCell(col);
      if (!cell) {
        return null;
      }
      return {
        inverse: Boolean(cell.isInverse()),
        chars: cell.getChars(),
        bg: cell.getBgColor(),
        bgRgb: cell.isBgRGB(),
      };
    };
    window.__cellFg = (col, row) => {
      const buffer = term.buffer.active;
      const cell = buffer.getLine(buffer.viewportY + row)?.getCell(col);
      if (!cell) {
        return null;
      }
      return { rgb: cell.isFgRGB(), color: cell.getFgColor() };
    };
    window.__workbenchReady = true;

    function option(name) {
      return params.get(name) ?? localStorage.getItem(`workbench-${name}`);
    }

    function numericOption(name, fallback) {
      const value = Number(option(name));
      return Number.isFinite(value) && value > 0 ? value : fallback;
    }
    </script>
  </body>
</html>
